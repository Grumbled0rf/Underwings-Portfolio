<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27dab4"/>
      <stop offset="100%" stop-color="#24d758"/>
    </linearGradient>
  </defs>

  <!-- Wing Icon -->
  <g transform="translate(10, 15)">
    <!-- Left Wing -->
    <path d="M25 25 Q15 20 8 30 Q5 35 10 40 Q18 35 25 38 Q20 32 25 25"
          fill="url(#wingGradient)" opacity="0.9"/>
    <path d="M25 25 Q20 15 12 18 Q6 22 8 30 Q15 25 25 25"
          fill="url(#wingGradient)" opacity="0.7"/>

    <!-- Right Wing -->
    <path d="M25 25 Q35 20 42 30 Q45 35 40 40 Q32 35 25 38 Q30 32 25 25"
          fill="url(#wingGradient)" opacity="0.9"/>
    <path d="M25 25 Q30 15 38 18 Q44 22 42 30 Q35 25 25 25"
          fill="url(#wingGradient)" opacity="0.7"/>

    <!-- Center Accent -->
    <circle cx="25" cy="30" r="3" fill="url(#wingGradient)"/>
  </g>

  <!-- UNDERWINGS Text - Dark version for light backgrounds -->
  <text x="75" y="48" font-family="Geist, Arial, sans-serif" font-weight="600" font-size="28" fill="#111111" letter-spacing="3">
    UNDERWINGS
  </text>

  <!-- Tagline -->
  <text x="75" y="65" font-family="Geist, Arial, sans-serif" font-weight="400" font-size="10" fill="rgba(17,17,17,0.6)" letter-spacing="2">
    CYBERSECURITY SOLUTIONS
  </text>
</svg>
