<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27dab4"/>
      <stop offset="100%" stop-color="#24d758"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#27dab4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#27dab4"/>
      <stop offset="100%" stop-color="#24d758" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative Grid -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Accent Line Top -->
  <rect x="200" y="150" width="800" height="2" fill="url(#accentLine)" opacity="0.5"/>

  <!-- Wing Icon -->
  <g transform="translate(500, 220)">
    <path d="M100 80 Q48 56 20 104 Q8 136 32 168 Q72 140 100 160 Q72 120 100 80" fill="url(#wingGradient)" opacity="0.95"/>
    <path d="M100 80 Q64 40 24 60 Q0 88 20 120 Q56 88 100 80" fill="url(#wingGradient)" opacity="0.7"/>
    <path d="M100 80 Q152 56 180 104 Q192 136 168 168 Q128 140 100 160 Q128 120 100 80" fill="url(#wingGradient)" opacity="0.95"/>
    <path d="M100 80 Q136 40 176 60 Q200 88 180 120 Q144 88 100 80" fill="url(#wingGradient)" opacity="0.7"/>
    <circle cx="100" cy="112" r="12" fill="url(#wingGradient)"/>
    <circle cx="100" cy="112" r="6" fill="#111"/>
  </g>

  <!-- UNDERWINGS Text -->
  <text x="600" y="440" font-family="Geist, Arial, sans-serif" font-weight="600" font-size="56" fill="#ffffff" letter-spacing="8" text-anchor="middle">
    UNDERWINGS
  </text>

  <!-- Tagline -->
  <text x="600" y="485" font-family="Geist, Arial, sans-serif" font-weight="400" font-size="20" fill="rgba(255,255,255,0.6)" letter-spacing="4" text-anchor="middle">
    CYBERSECURITY SOLUTIONS
  </text>

  <!-- Accent Line Bottom -->
  <rect x="200" y="510" width="800" height="2" fill="url(#accentLine)" opacity="0.5"/>

  <!-- Website -->
  <text x="600" y="570" font-family="Geist Mono, monospace" font-weight="400" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2" text-anchor="middle">
    underwings.org
  </text>
</svg>
